<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">

  <script src="assets/js/theme.js"></script>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-pdacek sticky-top" aria-label="Main navigation">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <img src="assets/img/logo.svg" alt="" width="36" height="36">
        <span>PDACEK <small class="d-none d-md-inline fw-normal text-muted-pdacek">Campus Nav</small></span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain" aria-controls="navMain" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="search.html">Search</a></li>

          <li class="nav-item"><a class="nav-link" href="department.html?id=cse">Departments</a></li>
          <li class="nav-item"><a class="nav-link active" href="facilities.html">Facilities</a></li>
          <li class="nav-item">
            <button type="button" class="btn btn-sm btn-outline-secondary ms-lg-2" data-theme-toggle aria-label="Toggle dark mode">
              <span data-theme-icon>🌙</span>
            </button>

        </ul>

    </div>

  <main class="py-5">

      <h1 class="section-title">Facility Finder</h1>
      <p class="text-muted-pdacek mb-4">Locate libraries, canteens, sports, medical, and other campus services.</p>
      <div class="row g-4 facility-grid" id="facility-grid"></div>
    </div>

  <footer class="footer-pdacek">
    <div class="container text-center">
      <p class="mb-0"><a href="index.html">← Back to Home</a></p>

  <script src="assets/js/campus-data.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      if (new URLSearchParams(window.location.search).get("id")) {
        var section = document.getElementById("facility-list-section");
        if (section) section.classList.add("d-none");
      }
    });
  </script>
