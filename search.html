<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search — PDACEK Campus Nav</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="assets/css/styles.css">
  <script src="assets/js/theme.js"></script>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-pdacek sticky-top" aria-label="Main navigation">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <img src="assets/img/logo.svg" alt="" width="36" height="36">
        <span>PDACEK <small class="d-none d-md-inline fw-normal text-muted-pdacek">Campus Nav</small></span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain" aria-controls="navMain" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="search.html">Search</a></li>
          <li class="nav-item"><a class="nav-link" href="map.html">Campus Map</a></li>
          <li class="nav-item"><a class="nav-link" href="department.html?id=cse">Departments</a></li>
          <li class="nav-item"><a class="nav-link" href="facilities.html">Facilities</a></li>
          <li class="nav-item">
            <button type="button" class="btn btn-sm btn-outline-secondary ms-lg-2" data-theme-toggle aria-label="Toggle dark mode">
              <span data-theme-icon>🌙</span>
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="py-5">
    <div class="container">
      <h1 class="section-title">Search Campus</h1>
      <p class="text-muted-pdacek mb-4">Find departments, classrooms, and facilities across PDACEK campus.</p>

      <div class="search-wrapper search-wrapper-lg mb-3" role="search">
        <span class="search-icon" aria-hidden="true">🔍</span>
        <label for="page-search" class="visually-hidden">Search locations</label>
        <input type="search" id="page-search" class="search-input" style="border-radius: 0.75rem;" placeholder="Try: Library, CSE, Canteen, FY-101…" autocomplete="off" aria-controls="page-suggestions">
        <div id="page-suggestions" class="suggestions-dropdown" role="listbox"></div>
      </div>

      <div class="filter-chips" role="group" aria-label="Filter by type">
        <button type="button" class="filter-chip active" data-filter="all">All</button>
        <button type="button" class="filter-chip" data-filter="departments">Departments</button>
        <button type="button" class="filter-chip" data-filter="faculty">Faculty</button>
        <button type="button" class="filter-chip" data-filter="classrooms">Classrooms</button>
        <button type="button" class="filter-chip" data-filter="facilities">Facilities</button>
        <button type="button" class="filter-chip" data-filter="labs">Labs</button>
      </div>

      <div id="search-results"></div>
      <div id="search-empty" class="empty-state d-none">
        <div class="empty-icon">🔍</div>
        <h2 class="h5">No locations found</h2>
        <p>Try searching for <strong>Library</strong>, <strong>CSE</strong>, <strong>Canteen</strong>, or <strong>First Year</strong>.</p>
      </div>
    </div>
  </main>

  <footer class="footer-pdacek">
    <div class="container text-center">
      <p class="mb-0"><a href="index.html">← Back to Home</a></p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script src="assets/js/campus-data.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
