<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Department — PDACEK Campus Nav</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="assets/css/styles.css">
  <script src="assets/js/theme.js"></script>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-pdacek sticky-top" aria-label="Main navigation">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <img src="assets/img/logo.svg" alt="" width="36" height="36">
        <span>PDACEK <small class="d-none d-md-inline fw-normal text-muted-pdacek">Campus Nav</small></span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain" aria-controls="navMain" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="search.html">Search</a></li>
          <li class="nav-item"><a class="nav-link" href="map.html">Campus Map</a></li>
          <li class="nav-item"><a class="nav-link active" href="department.html?id=cse">Departments</a></li>
          <li class="nav-item"><a class="nav-link" href="facilities.html">Facilities</a></li>
          <li class="nav-item">
            <button type="button" class="btn btn-sm btn-outline-secondary ms-lg-2" data-theme-toggle aria-label="Toggle dark mode">
              <span data-theme-icon>🌙</span>
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main>
    <div class="container py-4">
      <p class="text-muted-pdacek small mb-3">Browse departments:</p>
      <div class="d-flex flex-wrap gap-2 mb-4" id="dept-quick-links">
        <!-- populated by inline script after data loads -->
      </div>
    </div>
    <div id="department-detail"></div>
  </main>

  <footer class="footer-pdacek">
    <div class="container text-center">
      <p class="mb-0"><a href="search.html">Search</a> · <a href="index.html">Home</a></p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script src="assets/js/campus-data.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const wrap = document.getElementById("dept-quick-links");
      if (wrap && typeof campusData !== "undefined") {
        wrap.innerHTML = campusData.departments
          .map(function (d) {
            return '<a href="department.html?id=' + d.id + '" class="btn btn-outline-primary btn-sm">' + d.name.split(" ")[0] + "</a>";
          })
          .join("");
      }
    });
  </script>
  <script src="assets/js/app.js"></script>
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</body>
</html>
